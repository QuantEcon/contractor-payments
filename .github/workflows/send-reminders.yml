name: Send period-close reminders (reusable)

# Reusable workflow that scans a contractor repo for open draft
# submissions whose period has ended, and posts a sentinel-marked
# reminder comment on each. Idempotent across re-runs.
#
# Called from every contractor repo's thin
# `.github/workflows/period-reminders.yml` on a monthly schedule.
#
# See PLAN.md §8 Phase 3c (Period-close reminders).

on:
  workflow_call:
    inputs:
      dry_run:
        description: "If true, log what would be posted; don't post anything."
        required: false
        type: boolean
        default: false

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check out the contractor repo
        uses: actions/checkout@v4

      - name: Check out the engine repo
        uses: actions/checkout@v4
        with:
          repository: QuantEcon/contractor-payments
          path: engine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Send reminders
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: engine
        run: |
          DRY_RUN_ARG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          python -m scripts.send_reminders \
            --fiscal-host engine/templates/fiscal-host.yml \
            $DRY_RUN_ARG
