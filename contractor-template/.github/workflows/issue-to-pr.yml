name: Issue to PR

# Thin caller for the reusable workflow in QuantEcon/contractor-payments.
# All pipeline logic — parsing, PR creation, error comments, PDF render —
# lives there. Updates to the engine flow through to this repo on every
# push to the engine's main branch (no per-contractor-repo sync needed).
#
# See PLAN.md §8 Phase 3a.

on:
  issues:
    types: [opened, edited]

jobs:
  process:
    if: >-
      contains(github.event.issue.labels.*.name, 'timesheet') ||
      contains(github.event.issue.labels.*.name, 'milestone-invoice')
    uses: QuantEcon/contractor-payments/.github/workflows/process-submission.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      issue_number: ${{ github.event.issue.number }}
      issue_title: ${{ github.event.issue.title }}
      issue_author: ${{ github.event.issue.user.login }}
      issue_body: ${{ github.event.issue.body }}
    secrets: inherit
