name: Period reminders

# Thin caller for the reusable workflow in QuantEcon/contractor-payments.
# Posts a one-time reminder comment on each open draft submission whose
# period has ended. Idempotent: each (issue, period) pair gets at most
# one reminder, ever.
#
# Runs at 09:00 UTC on the 1st of every month. The engine handles
# fiscal-host timezone arithmetic to decide which periods have closed.
#
# `workflow_dispatch` is included so an admin can run the scan manually
# (e.g. to validate behaviour on a test repo, or catch up after a missed
# schedule run). Use the `dry_run` input to log without posting.
#
# See PLAN.md §8 Phase 3c (Period-close reminders).

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log what would be posted; don't post anything."
        required: false
        type: boolean
        default: false

jobs:
  remind:
    uses: QuantEcon/contractor-payments/.github/workflows/send-reminders.yml@main
    permissions:
      contents: read
      issues: write
    with:
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
