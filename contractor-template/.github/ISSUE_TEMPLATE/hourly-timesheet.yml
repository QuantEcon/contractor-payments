name: 📋 Hourly Timesheet
description: Submit a monthly timesheet for hours worked on an hourly contract.
title: "Timesheet submission"
labels: ["timesheet", "pending-review"]

# NOTE: This file is a template. It contains `$CONTRACT_OPTIONS` placeholder
# substituted by onboarding/new-contractor.py into a real options list when
# seeded into a new contractor repo. As-is, this file will NOT load as valid
# YAML — that is intentional. See PLAN.md §4.3 and §5.

body:
  - type: markdown
    attributes:
      value: |
        ## Hourly Timesheet Submission

        Fill out the fields below to open a **draft timesheet** for
        this period. After the issue is created you can edit the issue
        body to add rows to the Time Entries table — accumulate
        entries as you work, no need to file everything at once.

        When you're ready to file the timesheet:

        - Comment **`/validate`** on the issue to check that your
          entries parse cleanly. You'll get a reply with parse results
          and computed totals. No PR is opened.
        - Comment **`/submit`** (or apply the `submit` label) to file
          the timesheet. A Pull Request will open with the rendered
          PDF; an admin reviews and merges.

        **Corrections before submission:** edit the issue body.
        **After submission:** the issue is locked; edit the PR branch
        directly, or ask an admin to revise.

        Need help? See the
        [Submit a timesheet](https://quantecon.github.io/contractor-payments/contractor-guide/submit-timesheet/) guide.

  - type: markdown
    attributes:
      value: |
        **Active hourly contracts (reminder):**

$HOURLY_CONTRACT_REMINDER

  - type: dropdown
    id: contract
    attributes:
      label: Contract
      description: Which contract does this timesheet apply to?
      options:
$CONTRACT_OPTIONS
    validations:
      required: true

  - type: dropdown
    id: year
    attributes:
      label: Year
      description: Calendar year of this timesheet.
      options:
        - "2026"
        - "2027"
    validations:
      required: true

  - type: dropdown
    id: month
    attributes:
      label: Month
      description: Calendar month of this timesheet.
      options:
        - "01"
        - "02"
        - "03"
        - "04"
        - "05"
        - "06"
        - "07"
        - "08"
        - "09"
        - "10"
        - "11"
        - "12"
    validations:
      required: true

  - type: textarea
    id: entries
    attributes:
      label: Time Entries
      description: |
        One row per day worked, in the format:
        `YYYY-MM-DD | hours | description`

        You can leave the seeded header row as-is when first creating
        the issue, and add entries by editing the issue body over time.
        Hours may be fractional (e.g. 4.5). Descriptions may contain
        any text — the parser splits on the first two `|` only.

        **Keep the `Date | Hours | Description` header row in place** —
        the parser uses it to recognise this as the entries table.
      value: |
        Date | Hours | Description
        2026-04-06 | 3.5 | Example entry — replace or extend with your own rows
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes (optional)
      placeholder: e.g. "Travel time on the 15th not included."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I confirm that the hours and descriptions above are accurate.
          required: true
