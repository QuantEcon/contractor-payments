name: 🎯 Milestone Invoice
description: Submit an invoice for a milestone delivered on a milestone contract.
title: "Milestone invoice submission"
labels: ["milestone-invoice", "pending-review"]

# NOTE: This file is a template. It contains the `$$MILESTONE_CONTRACT_OPTIONS`
# placeholder substituted by onboarding/sync_templates.py into a real options
# list (filtered to active milestone-type contracts only) when seeded into a
# contractor repo. The doubled $ here is a Template escape — multi-contract
# substitutions are multi-line and must never fire inside this comment.
# As-is, this file will NOT load as valid YAML — that is intentional.
# See PLAN.md §4.6 and §5.

body:
  - type: markdown
    attributes:
      value: |
        ## Milestone Invoice Submission

        Fill out the fields below to open a **draft invoice** for a
        milestone you have delivered on a milestone contract. After
        the issue is created you can edit the issue body to add or
        adjust rows in the Milestone Entries table — useful for
        catch-up submissions covering multiple missed milestones.

        Refer to your contract for the milestone schedule (IDs, dates,
        amounts).

        When you're ready to file the invoice:

        - Comment **`/validate`** on the issue to check that your
          entries parse cleanly. You'll get a reply with parse results
          and computed totals. No PR is opened.
        - Comment **`/submit`** (or apply the `submit` label) to file
          the invoice. A Pull Request will open with the rendered
          PDF; an admin reviews and merges.

        **Corrections before submission:** edit the issue body.
        **After submission:** the issue is locked; edit the PR branch
        directly, or ask an admin to revise.

        Need help? See the
        [Submit a milestone invoice](https://quantecon.github.io/contractor-payments/contractor-guide/submit-invoice/) guide.

  - type: markdown
    attributes:
      value: |
        **Active milestone contracts (reminder):**

$MILESTONE_CONTRACT_REMINDER

  - type: dropdown
    id: contract
    attributes:
      label: Contract
      description: Which milestone contract does this invoice apply to?
      options:
$MILESTONE_CONTRACT_OPTIONS
    validations:
      required: true

  - type: dropdown
    id: year
    attributes:
      label: Year
      description: Calendar year of this invoice.
      options:
        - "2026"
        - "2027"
    validations:
      required: true

  - type: dropdown
    id: month
    attributes:
      label: Month
      description: Calendar month of this invoice.
      options:
        - "01"
        - "02"
        - "03"
        - "04"
        - "05"
        - "06"
        - "07"
        - "08"
        - "09"
        - "10"
        - "11"
        - "12"
    validations:
      required: true

  - type: textarea
    id: entries
    attributes:
      label: Milestone Entries
      description: |
        One row per milestone claimed, in the format:
        `ID | YYYY-MM-DD | amount | description`

        - **ID** — milestone number from the contract schedule (e.g. `3`)
        - **Date** — milestone delivery date
        - **Amount** — payment amount (currency is fixed by the contract)
        - **Description** — what was delivered

        Almost always a single row. Add multiple rows only for catch-up
        submissions covering missed prior months. Descriptions may
        contain any text — the parser splits on the first three `|` only.

        **Keep the `ID | Date | Amount | Description` header row in
        place** — the parser uses it to recognise this as the entries
        table.
      value: |
        ID | Date | Amount | Description
        3 | 2026-07-15 | 77000 | Example entry — replace with your milestone row
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes (optional)
      placeholder: e.g. "Catch-up submission covering May–Jul; May was missed in error."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I confirm that the milestones listed above have been delivered and the amounts are correct per the contract.
          required: true
