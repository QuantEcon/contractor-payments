# fiscal-host.yml — identity and policy for QuantEcon's fiscal host
# (PSL Foundation) and for QuantEcon itself.
#
# Single source of truth across every contractor repo. Edit here if either
# organisation moves, the payer's policy timezone changes, or the
# notification recipients change; the change flows through the next time
# any submission is rendered or any approval is processed.
#
# Set `address` to null to render the logo without an address block (the
# current arrangement for QuantEcon).

psl_foundation:
  name: PSL Foundation
  address: |
    2108 Greene Street
    PO Box 50932
    Columbia, SC 29250
    United States
  # IANA timezone for the fiscal host. Used as the policy timezone for
  # document issue dates (submission, approval) so every contractor's
  # paperwork lines up with the fiscal host's books regardless of contractor
  # locale.
  timezone: America/New_York

quantecon:
  name: QuantEcon
  address: null

# Email notification config for approved submissions (Phase 2).
#
# Recipient addresses are intentionally NOT stored in this file. The engine
# repo is public, so committing real email addresses here would expose them
# to harvesters. Instead, recipients live as GitHub org-level Variables and
# are injected into the workflow at runtime:
#
#   vars.PSL_EMAIL                 → primary recipient (PSL Foundation contact)
#   vars.QUANTECON_EMAIL_REVIEWER  → Cc (QuantEcon human reviewer/approver)
#
# What stays here is the policy flag below. It is the engine-wide DEFAULT;
# each contractor repo can override it in its own `config/settings.yml`
# (notifications.testing_mode). Resolution order, most specific wins:
#   1. contractor repo config/settings.yml → notifications.testing_mode
#   2. this file (engine-wide default)
#   3. true (fail-safe — never email PSL if nothing is set)
# While the effective `testing_mode` is `true`, approval emails go to
# `vars.QUANTECON_EMAIL_REVIEWER` only — `vars.PSL_EMAIL` is never contacted.
# Keep this default `true`; production is opt-in per repo (set
# `testing_mode: false` in that contractor's settings.yml).
notifications:
  testing_mode: true
